# =============================================================================
# docker-compose.yml — SimpleRegister (Orquestación de Contenedores)
# Regla: "Si no tiene un Healthcheck, no está vivo" — todos los servicios
#        incluyen healthcheck. DB y Redis NO exponen puertos al host.
# Cuotas RAM: app=512MB | db=256MB | redis=128MB (VPS Tier 2GB)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Servicio: app (Next.js 15 Standalone)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: sr_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Servicio: worker (Email Queue Consumer)
  # Proceso independiente que consume la cola de emails de Redis.
  # Usa la misma imagen que app pero con comando de entrada independiente.
  # Cuota RAM: 128MB | Sin puertos expuestos | Depende solo de Redis
  # Trazabilidad: TSK-I2-B04-RF
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: sr_worker
    restart: unless-stopped
    command: ["node", "src/lib/workers/run_worker.js"]
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      EMAIL_QUEUE_KEY: email:queue
      EMAIL_DLQ_KEY: email:dlq
      EMAIL_RETRY_LIMIT: "3"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Servicio: db (PostgreSQL 16)
  # SEGURIDAD: Sin mapeo de puertos — solo accesible dentro de app_network
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: sr_db
    restart: unless-stopped
    # Habilitado para desarrollo local (host -> docker)
    ports:
      - "5432:5432"
    networks:
      - app_network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Optimización para VPS de baja memoria
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
      -c log_min_duration_statement=1000
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Servicio: redis (Redis 7 Alpine)
  # SEGURIDAD: Sin mapeo de puertos — solo accesible dentro de app_network
  # Cuota: maxmemory 100mb con política LRU para Rate Limit y sesiones
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sr_redis
    restart: unless-stopped
    # Habilitado para desarrollo local (host -> docker)
    ports:
      - "6379:6379"
    networks:
      - app_network
    command: >
      redis-server
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# Red interna — los contenedores se comunican por nombre de servicio
# DB y Redis no exponen puertos, solo la app expone el 3000 al host
# =============================================================================
networks:
  app_network:
    driver: bridge
    name: sr_network

# =============================================================================
# Volúmenes persistentes — datos de DB y Redis sobreviven reinicios
# =============================================================================
volumes:
  postgres_data:
    name: sr_postgres_data
  redis_data:
    name: sr_redis_data
